<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DashBoard Santos Games Corujões 2026</title>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_DOMINIO",
  projectId: "SEU_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentMonth = 0; // Janeiro
const year = 2026;

onAuthStateChanged(auth, (user) => {
  if(user){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    renderCalendar();
  }
});

window.login = () => {
  signInWithEmailAndPassword(auth,
    email.value, senha.value
  ).catch(()=>alert("Erro ao logar"));
}

window.logout = () => { signOut(auth); location.reload(); }

const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function renderCalendar(){
  monthLabel.innerText = meses[currentMonth] + " 2026";
  calendar.innerHTML="";
  diasSemana.innerHTML="";
  ["S","T","Q","Q","S","S","D"].forEach(d=>{
    diasSemana.innerHTML+=`<div class="semana">${d}</div>`;
  });

  const firstDay = new Date(year,currentMonth,1).getDay();
  const totalDays = new Date(year,currentMonth+1,0).getDate();

  for(let i=0;i<firstDay;i++) calendar.innerHTML+="<div></div>";

  for(let d=1; d<=totalDays; d++){
    const dateStr = year+"-"+String(currentMonth+1).padStart(2,'0')+"-"+String(d).padStart(2,'0');
    calendar.innerHTML+=`
      <div class="day" onclick="openDay('${dateStr}')">
        ${d}
        <div id="badge-${dateStr}" class="badge"></div>
      </div>`;
    loadCount(dateStr);
  }
}

window.prevMonth=()=>{ if(currentMonth>0){ currentMonth--; renderCalendar(); } }
window.nextMonth=()=>{ if(currentMonth<11){ currentMonth++; renderCalendar(); } }

function loadCount(dateStr){
  onSnapshot(collection(db,"corujoes",dateStr,"participantes"), snap=>{
    const badge=document.getElementById("badge-"+dateStr);
    if(badge){
      badge.innerText=snap.size+"/10";
      if(snap.size>=10) badge.style.background="#e10600";
    }
  });
}

window.openDay=(dateStr)=>{
  selectedDate.innerText=dateStr;
  dayPanel.style.display="block";

  onSnapshot(collection(db,"corujoes",dateStr,"participantes"), snap=>{
    list.innerHTML="";
    let i=0;
    snap.forEach(docSnap=>{
      const d=docSnap.data();
      list.innerHTML+=`
        <div class="item ${i<10?'confirmado':'espera'}">
          ${d.nome} - R$${d.valor} - ${d.status}
          <button onclick="updateStatus('${dateStr}','${docSnap.id}','Pago')">Pago</button>
          <button onclick="updateStatus('${dateStr}','${docSnap.id}','Pendente')">Pendente</button>
          <button onclick="removeParticipant('${dateStr}','${docSnap.id}')">X</button>
        </div>`;
      i++;
    });
  });
}

window.addParticipant=async()=>{
  const dateStr=selectedDate.innerText;
  const nome=newName.value;
  const valor=document.querySelector('input[name="valor"]:checked').value;
  const status=document.querySelector('input[name="status"]:checked').value;

  if(!nome) return alert("Digite nome");

  await addDoc(collection(db,"corujoes",dateStr,"participantes"),{
    nome, valor, status
  });
  newName.value="";
}

window.updateStatus=async(date,id,status)=>{
  await updateDoc(doc(db,"corujoes",date,"participantes",id),{status});
}

window.removeParticipant=async(date,id)=>{
  await deleteDoc(doc(db,"corujoes",date,"participantes",id));
}

window.exportMonth=async()=>{
  let totalPago=0;
  let totalPendente=0;
  let csv="Data,Nome,Valor,Status\n";

  for(let d=1; d<=31; d++){
    const dateStr=year+"-"+String(currentMonth+1).padStart(2,'0')+"-"+String(d).padStart(2,'0');
    const snap=await getDocs(collection(db,"corujoes",dateStr,"participantes"));
    snap.forEach(docSnap=>{
      const data=docSnap.data();
      csv+=`${dateStr},${data.nome},${data.valor},${data.status}\n`;
      if(data.status==="Pago") totalPago+=Number(data.valor);
      else totalPendente+=Number(data.valor);
    });
  }

  const blob=new Blob([csv],{type:"text/csv"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=meses[currentMonth]+"_2026.csv";
  link.click();

  alert("Pago: R$"+totalPago+" | Pendente: R$"+totalPendente);
}

window.showTab=(tab)=>{
  reserva.style.display=tab==="reserva"?"block":"none";
  faturamento.style.display=tab==="faturamento"?"block":"none";
}
</script>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}
header{background:#e10600;padding:15px;text-align:center;font-weight:bold;}
.tabs{display:flex;justify-content:center;gap:20px;padding:10px;}
.tabs button{padding:8px 20px;background:#222;color:white;border:none;}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.day{background:#1a1a1a;padding:15px;border-radius:6px;cursor:pointer;position:relative;}
.day:hover{background:#2a2a2a;}
.badge{position:absolute;bottom:5px;right:5px;font-size:11px;background:#333;padding:2px 6px;border-radius:10px;}
.semana{text-align:center;font-weight:bold;}
.item{padding:6px;margin:5px 0;background:#222;border-radius:5px;}
.confirmado{border-left:4px solid #00aa00;}
.espera{border-left:4px solid #e10600;}
</style>
</head>

<body>

<div id="login" style="max-width:400px;margin:100px auto;">
<h2>Santos Games 2026</h2>
<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">
<header>DashBoard Santos Games Corujões 2026</header>

<div class="tabs">
<button onclick="showTab('reserva')">Reserva</button>
<button onclick="showTab('faturamento')">Faturamento</button>
</div>

<div id="reserva">
<div style="display:flex;justify-content:space-between;padding:10px;">
<button onclick="prevMonth()">◀</button>
<h2 id="monthLabel"></h2>
<button onclick="nextMonth()">▶</button>
</div>

<div id="diasSemana" class="calendar"></div>
<div id="calendar" class="calendar"></div>

<div id="dayPanel" style="display:none;padding:15px;">
<h3>Data: <span id="selectedDate"></span></h3>
<input id="newName" placeholder="Nome">
<br><br>
Valor:
<label><input type="radio" name="valor" value="100" checked>100</label>
<label><input type="radio" name="valor" value="140">140</label>
<br>
Status:
<label><input type="radio" name="status" value="Pago">Pago</label>
<label><input type="radio" name="status" value="Pendente" checked>Pendente</label>
<br><br>
<button onclick="addParticipant()">Adicionar</button>
<div id="list"></div>
</div>
</div>

<div id="faturamento" style="display:none;padding:20px;">
<h2>Faturamento Mensal</h2>
<button onclick="exportMonth()">Exportar CSV do Mês</button>
</div>

<button onclick="logout()" style="margin:20px;">Sair</button>

</div>
</body>
</html>
