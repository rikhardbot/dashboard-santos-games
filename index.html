<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DashBoard Santos Games Corujões 2.0</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA_wOciiIQdOvMlYDgJLqLBwghDmFABQHM",
  authDomain: "dashboard-santos-games.firebaseapp.com",
  projectId: "dashboard-santos-games",
  storageBucket: "dashboard-santos-games.firebasestorage.app",
  messagingSenderId: "638652431482",
  appId: "1:638652431482:web:d1abc192de6ccdc684cfc3"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentDate = new Date();

onAuthStateChanged(auth, (user) => {
    if (user) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("dashboard").style.display = "block";
        renderCalendar();
    }
});

window.login = function(){
    signInWithEmailAndPassword(auth,
        document.getElementById("email").value,
        document.getElementById("senha").value
    ).catch(() => alert("Erro ao logar"));
}

window.logout = function(){
    signOut(auth);
    location.reload();
}

function renderCalendar(){
    const calendar = document.getElementById("calendar");
    calendar.innerHTML = "";

    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();

    document.getElementById("monthLabel").innerText =
        currentDate.toLocaleString('pt-BR', { month: 'long', year: 'numeric' });

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let i=0;i<firstDay;i++){
        calendar.innerHTML += "<div></div>";
    }

    for(let day=1; day<=daysInMonth; day++){
        const dateStr = year + "-" + String(month+1).padStart(2,'0') + "-" + String(day).padStart(2,'0');

        calendar.innerHTML += `
            <div class="day" onclick="openDay('${dateStr}')">
                ${day}
                <div id="count-${dateStr}" class="badge"></div>
            </div>`;

        loadCount(dateStr);
    }
}

window.prevMonth = function(){
    currentDate.setMonth(currentDate.getMonth()-1);
    renderCalendar();
}

window.nextMonth = function(){
    currentDate.setMonth(currentDate.getMonth()+1);
    renderCalendar();
}

function loadCount(dateStr){
    onSnapshot(collection(db, "corujoes", dateStr, "participantes"), snap => {
        const count = snap.size;
        const badge = document.getElementById("count-"+dateStr);
        if(badge){
            badge.innerText = count + "/10";
            if(count >= 10) badge.style.background = "#e10600";
        }
    });
}

window.openDay = function(dateStr){
    document.getElementById("selectedDate").innerText = dateStr;
    document.getElementById("dayPanel").style.display = "block";

    onSnapshot(collection(db, "corujoes", dateStr, "participantes"), snap => {
        const list = document.getElementById("participantList");
        list.innerHTML = "";
        let index = 0;

        snap.forEach(docSnap => {
            const d = docSnap.data();
            const statusBtn = d.status === "Pago"
                ? `<button onclick="updateStatus('${dateStr}','${docSnap.id}','Pendente')">🔴</button>`
                : `<button onclick="updateStatus('${dateStr}','${docSnap.id}','Pago')">🟢</button>`;

            list.innerHTML += `
                <div class="participant ${index<10?'confirmado':'espera'}">
                    ${d.nome} - ${d.status}
                    ${statusBtn}
                    <button onclick="removeParticipant('${dateStr}','${docSnap.id}')">❌</button>
                </div>`;
            index++;
        });
    });
}

window.addParticipant = async function(){
    const dateStr = document.getElementById("selectedDate").innerText;
    const nome = document.getElementById("newName").value;
    if(!nome) return alert("Digite um nome");

    await addDoc(collection(db, "corujoes", dateStr, "participantes"), {
        nome: nome,
        status: "Pendente"
    });

    document.getElementById("newName").value = "";
}

window.updateStatus = async function(dateStr, id, status){
    await updateDoc(doc(db, "corujoes", dateStr, "participantes", id), { status });
}

window.removeParticipant = async function(dateStr, id){
    await deleteDoc(doc(db, "corujoes", dateStr, "participantes", id));
}
</script>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
header { background:#e10600; padding:15px; text-align:center; font-weight:bold; }
.login { max-width:400px; margin:100px auto; background:#1a1a1a; padding:30px; border-radius:10px; }
#dashboard { display:none; padding:20px; }
.calendar { display:grid; grid-template-columns: repeat(7, 1fr); gap:10px; }
.day { background:#1a1a1a; padding:20px; border-radius:8px; cursor:pointer; position:relative; }
.day:hover { background:#2a2a2a; }
.badge { position:absolute; bottom:5px; right:5px; background:#333; padding:2px 6px; border-radius:12px; font-size:12px; }
#dayPanel { display:none; background:#1a1a1a; padding:20px; margin-top:20px; border-radius:10px; }
.participant { padding:8px; margin:5px 0; background:#222; border-radius:5px; }
.confirmado { border-left:4px solid #00aa00; }
.espera { border-left:4px solid #e10600; }
button { background:#e10600; color:white; border:none; padding:6px 10px; margin-left:5px; cursor:pointer; }
button:hover { background:#b00500; }
.nav { display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; }
input { padding:8px; width:70%; }
</style>
</head>
<body>

<div id="loginScreen" class="login">
<h2>SANTOS GAMES</h2>
<p>DashBoard Corujões 2.0</p>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="password" id="senha" placeholder="Senha"><br><br>
<button onclick="login()">Entrar</button>
</div>

<div id="dashboard">
<header>DashBoard Santos Games Corujões</header>

<div class="nav">
<button onclick="prevMonth()">◀</button>
<h2 id="monthLabel"></h2>
<button onclick="nextMonth()">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<div id="dayPanel">
<h3>Data: <span id="selectedDate"></span></h3>
<input type="text" id="newName" placeholder="Nome do participante">
<button onclick="addParticipant()">Adicionar</button>
<div id="participantList"></div>
</div>

<button onclick="logout()">Sair</button>

</div>

</body>
</html>
